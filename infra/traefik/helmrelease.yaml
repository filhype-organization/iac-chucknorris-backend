apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 30m
  chart:
    spec:
      chart: traefik
      version: ">=30.0.0 <40.0.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: flux-system
  targetNamespace: ingress
  install:
    crds: CreateReplace
  upgrade:
    crds: CreateReplace
  values:
    ingressClass:
      enabled: true
      isDefaultClass: true
      name: traefik
    service:
      type: LoadBalancer
    logs:
      access:
        enabled: true
    providers:
      kubernetesIngress:
        publishedService:
          enabled: true
