apiVersion: apps/v1
kind: Deployment
metadata:
  name: chuck-norris-backend
  namespace: chuck-norris
  labels:
    app.kubernetes.io/name: chuck-norris-backend
    app.kubernetes.io/managed-by: timoni
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chuck-norris-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chuck-norris-backend
        app.kubernetes.io/managed-by: timoni
    spec:
      containers:
        - name: chuck-norris-backend
          # CI updates this line automatically — do not edit manually.
          image: leeson77/chuck-norris-backend:b385913 # {"$imagepolicy": "flux-system:chuck-norris-backend"}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: chuck-norris-backend-config
            - secretRef:
                name: auth0-oidc-secret
          env:
            - name: QUARKUS_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: username
            - name: QUARKUS_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: database-secret
                  key: password
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 2
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
