apiVersion: v1
kind: ConfigMap
metadata:
  name: chuck-norris-backend-config
  namespace: chuck-norris
  labels:
    app.kubernetes.io/name: chuck-norris-backend
    app.kubernetes.io/managed-by: timoni
data:
  QUARKUS_DATASOURCE_JDBC_URL: "jdbc:postgresql://postgres-rw.postgres.svc.cluster.local:5432/app"
  QUARKUS_HIBERNATE_ORM_DATABASE_GENERATION: "validate"
  QUARKUS_OIDC_CLIENT_ID: "2GSRAJdfhRYURWjwlnYwJlJN4J9cEi4o"
  QUARKUS_OIDC_TOKEN_ISSUER: "https://dev-lesson.eu.auth0.com/"
  QUARKUS_OIDC_AUTH_SERVER_URL: "https://dev-lesson.eu.auth0.com"
  QUARKUS_OIDC_TOKEN_AUDIENCE: "chuck-norris-api"
  QUARKUS_OIDC_APPLICATION_TYPE: "service"
  QUARKUS_OIDC_TOKEN_VERIFY_ACCESS_TOKEN_WITH_USER_INFO: "false"
  QUARKUS_OIDC_ROLES_ROLE_CLAIM_PATH: "scope"
  QUARKUS_HTTP_CORS: "true"
  QUARKUS_HTTP_CORS_ORIGINS: "https://chuck.filhype.ovh"
  QUARKUS_HTTP_CORS_METHODS: "GET,POST,PUT,DELETE"
  QUARKUS_HTTP_CORS_HEADERS: "Content-Type,Authorization"
  QUARKUS_HTTP_CORS_EXPOSED_HEADERS: "X-Total-Count"
  QUARKUS_HTTP_CORS_ACCESS_CONTROL_ALLOW_CREDENTIALS: "true"
