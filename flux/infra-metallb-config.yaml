apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infra-metallb-config
  namespace: flux-system
spec:
  interval: 10m
  path: ./infra/metallb-config
  prune: true
  wait: true
  timeout: 3m
  sourceRef:
    kind: GitRepository
    name: iac-chucknorris-backend
  dependsOn:
    - name: infra-metallb
